<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Listagem de Livros</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Livros Cadastrados</h1>

<button onclick="window.location.href='cadastro.html'">
Novo Livro
</button>

<br><br>

<input
type="text"
id="busca"
placeholder="Buscar por título"
onkeyup="buscarLivro()">

<br><br>

<table>

<thead>
<tr>
<th>Título</th>
<th>Autor</th>
<th>Ano</th>
<th>Código</th>
<th>Editora</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaLivros">

</tbody>

</table>

</div>

<script src="listagem.js"></script>

</body>
</html>
